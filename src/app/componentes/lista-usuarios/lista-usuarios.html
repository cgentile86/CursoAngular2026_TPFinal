<div class="encabezado">
        <h2>Usuarios</h2>
</div>
<div class="acciones-usuarios">
    <button class="btn btn-principal" [routerLink]="['/usuarios/crear']">Crear Usuario</button>
</div>
<div class="contenedor-tabla">
  <table class="tabla-usuarios">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>E-mail</th>
        <th>Rol</th>
        <th>Estado</th>
        <th class="texto-centrado">Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (usuario of listaUsuarios; track usuario.id) {
        <tr>
          <td>{{ usuario.id }}</td>
          <td><strong>{{ usuario.username }}</strong></td>
          <td>{{ usuario.email }}</td>
          <td>{{ usuario.rol }}</td>
          <td>{{ usuario.estado }}</td>
          <td class="texto-centrado">
            <div class="acciones">
              <button class="btn btn-ver" [routerLink]="['/usuarios/detalle/', usuario.id]">
                Ver
              </button>
              <button class="btn btn-editar" (click)="cambiarEstadoUsuario(usuario.id)">
                Cambiar Estado
              </button>
              <button class="btn btn-eliminar" (click)="eliminarUsuario(usuario.id)">
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="tabla-vacia">
            No hay usuarios registrados.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
